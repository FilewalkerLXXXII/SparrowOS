# SparrowOS tmux Configuration
# Cyberpunk "Hackers" aesthetic terminal multiplexer

# ---------------------------------------------------------------------------
# Prefix key — Ctrl-a (more ergonomic than default Ctrl-b)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# General settings
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g escape-time 0
set -g repeat-time 600
set -g focus-events on
set -g display-time 2000
set -g display-panes-time 2000

# ---------------------------------------------------------------------------
# Vi mode
# ---------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---------------------------------------------------------------------------
# Window / pane management
# ---------------------------------------------------------------------------
# Split panes with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vi-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vi keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick reload
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ---------------------------------------------------------------------------
# Cyberpunk color theme
# ---------------------------------------------------------------------------

# Status bar position
set -g status-position top
set -g status-interval 5
set -g status-justify left

# Status bar colors
set -g status-style "bg=#0a0a0a,fg=#00ff00"

# Left status: session name
set -g status-left-length 30
set -g status-left "#[bg=#1a1a1a,fg=#00ffff,bold] #S #[bg=#0a0a0a] "

# Right status: host, date, time
set -g status-right-length 80
set -g status-right "#[fg=#333333]|#[fg=#0088ff] #H #[fg=#333333]|#[fg=#ffcc00] %Y-%m-%d #[fg=#333333]|#[fg=#ff00ff,bold] %H:%M "

# Window status (inactive)
setw -g window-status-format "#[fg=#333333] #I:#W "

# Window status (active)
setw -g window-status-current-format "#[bg=#1a1a1a,fg=#00ffff,bold] #I:#W #[fg=#00ffff]"

# Window status separator
setw -g window-status-separator ""

# ---------------------------------------------------------------------------
# Pane borders
# ---------------------------------------------------------------------------
set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#00ffff"

# ---------------------------------------------------------------------------
# Message / command line
# ---------------------------------------------------------------------------
set -g message-style "bg=#1a1a1a,fg=#00ff00"
set -g message-command-style "bg=#1a1a1a,fg=#00ffff"

# ---------------------------------------------------------------------------
# Mode (copy mode, etc.)
# ---------------------------------------------------------------------------
setw -g mode-style "bg=#333333,fg=#00ffff"

# ---------------------------------------------------------------------------
# Clock
# ---------------------------------------------------------------------------
setw -g clock-mode-colour "#ff00ff"
setw -g clock-mode-style 24

# ---------------------------------------------------------------------------
# Pane number display
# ---------------------------------------------------------------------------
set -g display-panes-active-colour "#00ffff"
set -g display-panes-colour "#333333"
