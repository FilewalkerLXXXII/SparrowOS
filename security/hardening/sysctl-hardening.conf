# ===========================================================================
# SparrowOS -- sysctl Hardening Values
# ===========================================================================
# Drop this file into /etc/sysctl.conf (or load via sysctl -f) to apply
# network and process-isolation hardening suitable for a multi-tenant
# FreeBSD server.
#
# These values complement the base /etc/sysctl.conf shipped with FreeBSD
# and should be reviewed before deployment.
# ===========================================================================

# ---------------------------------------------------------------------------
# Network hardening
# ---------------------------------------------------------------------------

# Silently drop TCP packets to closed ports instead of sending RST.
# 0 = normal RST, 1 = drop SYN only, 2 = drop all.
net.inet.tcp.blackhole=2

# Silently drop UDP packets to closed ports instead of sending ICMP
# port-unreachable.  1 = drop.
net.inet.udp.blackhole=1

# Drop TCP packets with both SYN and FIN set -- a common scan technique.
net.inet.tcp.drop_synfin=1

# Randomise IP identification field to frustrate OS fingerprinting and
# idle-scan attacks.
net.inet.ip.random_id=1

# Ignore ICMP redirect messages.  On a properly routed network these are
# unnecessary and can be abused for route-injection attacks.
net.inet.icmp.drop_redirect=1

# Do not send ICMP redirects.  A server/workstation should not act as a
# router.
net.inet.ip.redirect=0

# ---------------------------------------------------------------------------
# Process isolation & privilege hardening
# ---------------------------------------------------------------------------

# Prevent unprivileged users from seeing processes owned by other UIDs.
# Essential on multi-tenant systems.
security.bsd.see_other_uids=0

# Prevent unprivileged users from seeing processes inside jails they do
# not belong to.
security.bsd.see_jail_proc=0

# Disable unprivileged process debugging (ptrace).  Prevents a local
# user from attaching to another user's process.
security.bsd.unprivileged_proc_debug=0

# Require matching UID/GID for creating hard links to files.  Mitigates
# hard-link race-condition attacks (CVE-style symlink/hardlink tricks).
security.bsd.hardlink_check_uid=1
security.bsd.hardlink_check_gid=1

# ---------------------------------------------------------------------------
# Securelevel
# ---------------------------------------------------------------------------
# By default we leave securelevel at 0 for development flexibility.
# In production, raise to 1 (or higher) to lock down immutable flags,
# restrict /dev/mem access, and prevent module loading:
#
#   kern.securelevel=1
#
# NOTE: Once raised, the securelevel cannot be lowered without a reboot.
# Ensure all kernel modules are loaded before raising.
kern.securelevel=0
