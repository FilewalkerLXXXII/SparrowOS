#
# SparrowOS pf.conf — Stateful Firewall with Multi-Tenant Support
#
# Architecture:
#   - Default-deny policy
#   - Host outbound allowed
#   - SSH with brute-force protection
#   - WireGuard for tenant VPN access
#   - Per-tenant dynamic pf anchors (loaded by sparrow-tenant)
#   - AI tool sandbox restricting to API endpoints only
#

# ============================================================================
# MACROS
# ============================================================================

# External network interface (auto-detected at boot, override in rc.conf)
ext_if = "em0"

# Tenant bridge interface (VNET jail interconnect)
tenant_bridge = "bridge0"

# Loopback
lo_if = "lo0"

# AI API endpoints (HTTPS only)
ai_api_hosts = "{ api.anthropic.com, api.openai.com, generativelanguage.googleapis.com }"

# WireGuard listen port
wg_port = "51820"

# code-server port range (one per tenant, 8080-8180)
codeserver_ports = "8080:8180"

# ============================================================================
# TABLES
# ============================================================================

# Brute-force SSH offenders (auto-populated by overload rule)
table <bruteforce> persist

# AI tool allowed destinations (loaded from file)
table <ai_allowed> persist file "/etc/pf.tables/ai-allowed-hosts"

# Tenant IP pool (populated by sparrow-tenant)
table <tenants> persist

# ============================================================================
# OPTIONS
# ============================================================================

set skip on $lo_if
set block-policy drop
set loginterface $ext_if
set optimization aggressive
set state-policy if-bound

# Reassemble fragments
set reassemble yes

# ============================================================================
# NORMALIZATION
# ============================================================================

# Scrub all incoming traffic (defragment, normalize TTL)
scrub in all no-df random-id

# ============================================================================
# QUEUEING (placeholder for future QoS)
# ============================================================================

# TODO: Add HFSC queues for tenant traffic shaping

# ============================================================================
# DEFAULT DENY
# ============================================================================

block all
block log all

# ============================================================================
# ANTI-SPOOFING
# ============================================================================

antispoof quick for $ext_if

# ============================================================================
# HOST RULES
# ============================================================================

# Allow all outbound from host
pass out quick on $ext_if proto { tcp, udp } from any to any keep state
pass out quick on $ext_if proto icmp from any to any keep state

# SSH inbound with brute-force protection
pass in on $ext_if proto tcp to port 22 flags S/SA keep state \
    (max-src-conn 15, max-src-conn-rate 5/3, \
     overload <bruteforce> flush global)

# Block brute-force offenders
block drop in quick from <bruteforce>

# WireGuard VPN (tenant access)
pass in on $ext_if proto udp to port $wg_port keep state

# ============================================================================
# TENANT BRIDGE RULES
# ============================================================================

# Allow tenant bridge traffic (inter-jail comms controlled by anchors)
pass on $tenant_bridge all keep state

# NAT: Tenant jails reach internet via host's external IP
nat on $ext_if from <tenants> to any -> ($ext_if)

# ============================================================================
# PER-TENANT ANCHORS
# ============================================================================
#
# Each tenant gets a pf anchor loaded by `sparrow-tenant create`.
# Anchors are named "tenant/<tenant-name>" and loaded from
# /etc/pf.anchors/tenant-<name>.conf
#
# Example anchor content (generated from pf-tenant.conf.tmpl):
#   pass out from 10.0.1.2 to any
#   block in quick from <other_tenants> to 10.0.1.2
#
anchor "tenant/*"

# ============================================================================
# AI TOOL SANDBOX
# ============================================================================
#
# AI tools running in dedicated jails can ONLY reach their API endpoints
# over HTTPS (port 443) and perform DNS resolution (port 53).
# All other traffic is blocked.
#
anchor "ai-sandbox" {
    block all
    pass out proto tcp to <ai_allowed> port 443 keep state
    pass out proto { tcp, udp } to any port 53 keep state
}

# ============================================================================
# LOGGING
# ============================================================================
# All blocked packets are logged via pflog0.
# View with: tcpdump -n -e -ttt -i pflog0
# Or: pfctl -vvsr (show rules with counters)
