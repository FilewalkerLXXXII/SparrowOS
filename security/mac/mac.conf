# ===========================================================================
# SparrowOS -- MAC (Mandatory Access Control) Framework Configuration
# ===========================================================================
# FreeBSD's MAC framework provides pluggable security modules that enforce
# access-control policies beyond traditional Unix DAC (user/group/other).
#
# This file is read at boot by the MAC loader.  Each line specifies a
# module and its initial state.
#
# Available modules (subset relevant to SparrowOS):
#
#   mac_biba     -- Biba integrity model.  Assigns integrity labels to
#                   subjects (processes) and objects (files, sockets).
#                   Low-integrity processes cannot modify high-integrity
#                   objects, preventing untrusted code from tampering
#                   with system files.
#
#   mac_lomac    -- Low-watermark MAC (alternative to Biba).
#   mac_mls      -- Multi-Level Security (Bell-LaPadula confidentiality).
#   mac_portacl  -- Port-based access control (bind restrictions).
#
# ---------------------------------------------------------------------------
# Module loading
# ---------------------------------------------------------------------------
# Load the Biba integrity module.  This is the primary MAC policy for
# SparrowOS, providing integrity-based protection for system files and
# tenant isolation reinforcement.
#
# To load at boot, add to /boot/loader.conf:
#   mac_biba_load="YES"
#
mac_biba_load="YES"

# ---------------------------------------------------------------------------
# Enforcement mode
# ---------------------------------------------------------------------------
# DEFAULT: Permissive (labels are assigned and logged but NOT enforced).
#
# In permissive mode the kernel tracks and logs label violations without
# actually denying access.  This lets administrators audit what *would*
# be blocked before flipping the switch.
#
# To enable full enforcement, run:
#
#   sparrow-harden --enable-mac-enforcement
#
# or manually:
#
#   sysctl security.mac.biba.enabled=1
#
# The setting below keeps enforcement OFF by default so that a fresh
# install remains usable while the administrator reviews label policy.
#
security.mac.biba.enabled=0

# ---------------------------------------------------------------------------
# Label defaults
# ---------------------------------------------------------------------------
# When enforcement is enabled, newly created objects receive a default
# integrity label.  The values below are sane starting points; adjust
# after auditing your workload.
#
# Processes forked by root start at "high" integrity.
# Processes forked by unprivileged users start at "equal" (unrestricted
# in permissive mode, restricted in enforcing mode).
#
# security.mac.biba.root_label=high
# security.mac.biba.user_label=equal

# ---------------------------------------------------------------------------
# Notes
# ---------------------------------------------------------------------------
# - Loading a MAC module does NOT automatically enforce it.  Enforcement
#   must be toggled separately (see above).
# - Removing a MAC module after data has been labelled may cause access
#   errors.  Always test in permissive mode first.
# - mac_biba and mac_lomac are mutually exclusive; do not load both.
# ===========================================================================
