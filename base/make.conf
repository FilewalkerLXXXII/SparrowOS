#
# SparrowOS make.conf — Build-Time Compiler Options
#

# Optimize for the build machine's CPU
# Override with CPUTYPE=generic for portable builds
CPUTYPE?=native

# ccache for faster rebuilds
.if exists(/usr/local/libexec/ccache)
CC=/usr/local/libexec/ccache/cc
CXX=/usr/local/libexec/ccache/c++
.endif

# Parallel jobs (auto-detected in Makefile, but set a safe default)
MAKE_JOBS_NUMBER?=4
