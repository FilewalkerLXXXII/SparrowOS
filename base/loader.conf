#
# SparrowOS loader.conf — Boot Loader Configuration
#

# Boot delay (seconds)
autoboot_delay="3"

# ZFS boot
zfs_load="YES"
vfs.root.mountfrom="zfs:sparrow/ROOT/default"

# Encryption (GELI)
aesni_load="YES"
geom_eli_load="YES"

# Resource accounting (required for rctl per-tenant limits)
kern.racct.enable=1

# Disable confusing disk labels
kern.geom.label.disk_ident.enable="0"
kern.geom.label.gptid.enable="0"

# Power management
hw.pci.do_power_nodriver="3"

# Boot splash (cyberpunk SparrowOS logo)
splash_bmp_load="YES"
bitmap_load="YES"
bitmap_name="/boot/sparrow-splash.bmp"

# Packet filter
pf_load="YES"
pflog_load="YES"

# MAC modules (loaded but enforcement controlled via mac.conf)
mac_biba_load="YES"

# Firewall
if_bridge_load="YES"
bridgestp_load="YES"
