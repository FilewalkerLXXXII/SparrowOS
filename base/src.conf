#
# SparrowOS src.conf — FreeBSD Build Options
#
# Controls what gets built in the base system.
# See src.conf(5) for all available options.
#

# Reproducible builds (deterministic output)
REPRODUCIBLE_BUILD=yes

# Kernel
KERNCONF=SPARROW

# Security features (ensure enabled)
WITH_CAPSICUM=yes
WITH_CASPER=yes
WITH_AUDIT=yes

# Incremental build support
WITH_META_MODE=yes

# Strip unnecessary components (reduce attack surface + image size)
WITHOUT_BLUETOOTH=yes
WITHOUT_GAMES=yes
WITHOUT_LPR=yes
WITHOUT_SENDMAIL=yes
WITHOUT_TALK=yes
WITHOUT_FINGER=yes
WITHOUT_FTP=yes
WITHOUT_TFTP=yes
WITHOUT_NIS=yes

# Keep these (needed for SparrowOS)
WITH_ZFS=yes
WITH_UNBOUND=yes
WITH_OPENSSH=yes
WITH_PF=yes
