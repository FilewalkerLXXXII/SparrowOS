#
# SparrowOS rc.conf — Service Startup Configuration
#

hostname="sparrow"

# ---- CORE SERVICES ----
zfs_enable="YES"
sshd_enable="YES"
ntpd_enable="YES"
dumpdev="AUTO"
clear_tmp_enable="YES"
syslogd_flags="-ss"

# Disable sendmail (stripped in src.conf, but belt-and-suspenders)
sendmail_enable="NONE"

# ---- NETWORK ----
# Default to DHCP (overridden per-install via sparrow-setup)
ifconfig_DEFAULT="DHCP"
ipv6_activate_all_interfaces="YES"

# ---- FIREWALL ----
pf_enable="YES"
pflog_enable="YES"

# ---- AUDIT ----
auditd_enable="YES"

# ---- WAYLAND / DESKTOP ----
# seatd is required for Sway (unprivileged Wayland session management)
seatd_enable="YES"
dbus_enable="YES"

# Login manager (greetd starts Sway)
greetd_enable="YES"

# ---- MULTI-TENANT ----
# Tenant bridge interface
cloned_interfaces="bridge0"
ifconfig_bridge0="inet 10.0.0.1 netmask 255.255.0.0 up"

# WireGuard VPN for tenant access
wireguard_enable="YES"
wireguard_interfaces="wg0"

# ---- DNS ----
# Unbound for local DNS resolution with DNSSEC
local_unbound_enable="YES"
