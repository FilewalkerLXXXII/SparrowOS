#
# SparrowOS sysctl.conf — Runtime Kernel Tuning
#
# Desktop-optimized + security hardening baseline.
# Additional hardening in security/hardening/sysctl-hardening.conf
#

# ---- PERFORMANCE (Desktop) ----
# Shared memory (required for Wayland compositors)
kern.ipc.shmmax=2147483648
kern.ipc.shmall=524288

# VFS tuning (improves SSD performance)
vfs.read_max=128
vfs.zfs.arc_max=4294967296

# Reduce swappiness (prefer RAM for desktop responsiveness)
vm.swappiness=10

# ---- SECURITY ----
# See security/hardening/sysctl-hardening.conf for full hardening.
# These are the minimum safe defaults.

# Don't allow users to see other users' processes
security.bsd.see_other_uids=0
security.bsd.see_other_gids=0
security.bsd.see_jail_proc=0

# Prevent unprivileged process debugging
security.bsd.unprivileged_proc_debug=0
security.bsd.unprivileged_read_msgbuf=0

# Hardlink/symlink protections
security.bsd.hardlink_check_uid=1
security.bsd.hardlink_check_gid=1

# Stack guard page
security.bsd.stack_guard_page=1
