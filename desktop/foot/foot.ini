# SparrowOS Foot Terminal Configuration
# Cyberpunk "Hackers" aesthetic terminal emulator

[main]
font=IBM Plex Mono:size=11
dpi-aware=yes
pad=8x8
initial-window-size-chars=120x36

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[colors]
alpha=0.95
foreground=e0e0e0
background=0a0a0a

# Selection
selection-foreground=0a0a0a
selection-background=00ffff

# Normal colors (0-7)
# black
regular0=0a0a0a
# red
regular1=ff0055
# green
regular2=00ff00
# yellow
regular3=ffcc00
# blue
regular4=0088ff
# magenta
regular5=ff00ff
# cyan
regular6=00ffff
# white
regular7=e0e0e0

# Bright colors (8-15)
# bright black
bright0=333333
# bright red
bright1=ff3377
# bright green
bright2=33ff33
# bright yellow
bright3=ffdd44
# bright blue
bright4=33aaff
# bright magenta
bright5=ff44ff
# bright cyan
bright6=44ffff
# bright white
bright7=ffffff

[tweak]
font-monospace-warn=no

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+plus
font-decrease=Control+minus
font-reset=Control+0
spawn-terminal=Control+Shift+n
search-start=Control+Shift+f
