# SparrowOS Fuzzel Launcher Configuration
# Cyberpunk "Hackers" aesthetic application launcher

[main]
font=IBM Plex Mono:size=12
prompt=>
icon-theme=hicolor
icons-enabled=no
lines=12
width=50
horizontal-pad=16
vertical-pad=8
inner-pad=4
layer=overlay
exit-on-keyboard-focus-loss=yes
letter-spacing=0

[colors]
# Format: RRGGBBaa
background=0a0a0add
text=e0e0e0ff
match=00ff00ff
selection=1a1a1aff
selection-text=00ffffff
selection-match=00ff00ff
border=00ffffffdd

[border]
width=2
radius=0

[dmenu]
exit-immediately-if-empty=no

[key-bindings]
cancel=Escape Control+c
execute=Return
execute-or-next=Tab
cursor-left=Left Control+b
cursor-right=Right Control+f
delete-line=Control+u
delete-prev-word=Control+w
prev=Up Control+p
next=Down Control+n
