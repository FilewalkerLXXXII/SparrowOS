# SparrowOS — rctl Resource Profile: large
# High-capacity developer workspace
#
# Designed for power users running heavy compilation workloads, multiple
# AI coding tools simultaneously, container orchestration, or large-scale
# integration testing.  This is the maximum single-tenant allocation.
#
# Applied via:  rctl -a jail:<tenant>:<rule>
# See rctl(8) and sparrow-tenant(8) for details.

# --- CPU ---
# Limit to 8 logical cores
pcpu:deny=800

# --- Memory ---
# Physical (RSS) memory cap
memoryuse:deny=16G

# Virtual memory cap
vmemoryuse:deny=24G

# --- Processes & file descriptors ---
maxproc:deny=1024
openfiles:deny=16384

# --- Storage (managed outside rctl) ---
# ZFS quota: 250G
# Applied separately via: zfs set quota=250G zroot/sparrow/tenants/<tenant>
