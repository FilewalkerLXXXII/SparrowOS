# SparrowOS — rctl Resource Profile: small
# Entry-level developer workspace
#
# Intended for lightweight tenants running a single code-server instance,
# basic toolchains, and limited background tasks.  Suitable for learning,
# small personal projects, and low-traffic micro-services.
#
# Applied via:  rctl -a jail:<tenant>:<rule>
# See rctl(8) and sparrow-tenant(8) for details.

# --- CPU ---
# Limit to 2 logical cores (percentage of one core = 100)
pcpu:deny=200

# --- Memory ---
# Physical (RSS) memory cap
memoryuse:deny=4G

# Virtual memory cap (includes swap-backed pages)
vmemoryuse:deny=6G

# --- Processes & file descriptors ---
maxproc:deny=256
openfiles:deny=4096

# --- Storage (managed outside rctl) ---
# ZFS quota: 50G
# Applied separately via: zfs set quota=50G zroot/sparrow/tenants/<tenant>
