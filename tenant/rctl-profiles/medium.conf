# SparrowOS — rctl Resource Profile: medium
# Mid-tier developer workspace
#
# Suitable for tenants running code-server alongside build tools, containers,
# or multiple language runtimes.  Handles moderate CI workloads and
# multi-service development environments.
#
# Applied via:  rctl -a jail:<tenant>:<rule>
# See rctl(8) and sparrow-tenant(8) for details.

# --- CPU ---
# Limit to 4 logical cores
pcpu:deny=400

# --- Memory ---
# Physical (RSS) memory cap
memoryuse:deny=8G

# Virtual memory cap
vmemoryuse:deny=12G

# --- Processes & file descriptors ---
maxproc:deny=512
openfiles:deny=8192

# --- Storage (managed outside rctl) ---
# ZFS quota: 100G
# Applied separately via: zfs set quota=100G zroot/sparrow/tenants/<tenant>
